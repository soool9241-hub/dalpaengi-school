# ============================================================
# ADR-012: 모노레포 vs 멀티레포
# ============================================================
- id: ADR-012
  title: 현재는 멀티레포, 향후 모노레포 이전 고려
  status: accepted
  date: 2026-04-24
  context: |
    web·cleaning·crm 각각 독립적으로 시작.
    공통 코드 재사용 필요성 증가 중.
  decision: |
    - 현재: 별도 저장소, .claude/ 하네스만 복사·공유
    - 향후: pnpm workspace 기반 모노레포 이전 검토 (Turborepo)
  revisit_when: 공통 코드 3개 이상 중복 복제될 때
